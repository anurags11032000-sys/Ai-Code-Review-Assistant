services:
  postgres:
    image: postgres:16
    container_name: ai-review-postgres
    environment:
      POSTGRES_DB: ai_code_review_db
      POSTGRES_USER: ai_reviewer
      POSTGRES_PASSWORD: ai_reviewer_pwd
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: ai-review-redis
    ports:
      - "6380:6379"
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
